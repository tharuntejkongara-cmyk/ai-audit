<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Audit App</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #667eea, #764ba2);
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        width: 500px;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        resize: none;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        background: #667eea;
        color: white;
        border-radius: 8px;
        cursor: pointer;
    }

    button:hover {
        background: #5a67d8;
    }

    .result {
        margin-top: 15px;
        padding: 10px;
        border-radius: 8px;
        background: #f3f3f3;
    }

    .risk-low { color: green; }
    .risk-medium { color: orange; }
    .risk-high { color: red; }
</style>
</head>

<body>

<div class="container">
    <h2>🧠 AI Audit App</h2>

    <textarea id="inputText" placeholder="Paste text, policy, or code to audit..."></textarea>

    <button onclick="runAudit()">Run Audit</button>

    <div class="result" id="result">
        <p>Results will appear here...</p>
    </div>
</div>

<script>
function runAudit() {
    const text = document.getElementById("inputText").value.toLowerCase();
    const resultDiv = document.getElementById("result");

    if (!text) {
        resultDiv.innerHTML = "<p>Please enter content to audit.</p>";
        return;
    }

    let issues = [];
    let score = 0;

    // Simple rule-based checks
    if (text.includes("password") || text.includes("secret")) {
        issues.push("Sensitive information detected");
        score += 30;
    }

    if (text.includes("http://")) {
        issues.push("Insecure URL (use HTTPS)");
        score += 20;
    }

    if (text.length < 50) {
        issues.push("Content too short for proper audit");
        score += 10;
    }

    if (text.includes("admin")) {
        issues.push("Potential privilege-related keyword");
        score += 15;
    }

    // Risk classification
    let riskLevel = "Low";
    let riskClass = "risk-low";

    if (score > 40) {
        riskLevel = "High";
        riskClass = "risk-high";
    } else if (score > 20) {
        riskLevel = "Medium";
        riskClass = "risk-medium";
    }

    // Suggestions
    let suggestions = [
        "Avoid exposing sensitive information",
        "Use secure (HTTPS) connections",
        "Validate and sanitize inputs",
        "Follow least-privilege principles"
    ];

    resultDiv.innerHTML = `
        <h3 class="${riskClass}">Risk Level: ${riskLevel}</h3>
        <p><strong>Score:</strong> ${score}/100</p>

        <h4>Issues Found:</h4>
        <ul>
            ${issues.length ? issues.map(i => `<li>${i}</li>`).join("") : "<li>No major issues</li>"}
        </ul>

        <h4>Suggestions:</h4>
        <ul>
            ${suggestions.map(s => `<li>${s}</li>`).join("")}
        </ul>
    `;
}
</script>

</body>
</html>
